<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>var $ = require('jquery')</script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            user-select: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        #mapLayer {
            position: relative;
            width: max-content;
            height: max-content;
            transform-origin: center center;
            will-change: transform;
        }

        #mainImg {
            display: block;
            width: 0;
            -webkit-user-drag: none;
        }

        #playerPin {
            --heading: 0deg;
            display: none;
            position: absolute;
            width: 18px;
            height: 18px;
            z-index: 4;
            pointer-events: none;
            transform: translate(-50%, -50%) rotate(var(--heading));
            transform-origin: center center;
            will-change: left, top, transform;
        }

        #playerPin::before {
            content: "";
            position: absolute;
            inset: 3px;
            border: 2px solid white;
            border-radius: 50%;
            background: #e53935;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
        }

        #playerPin::after {
            content: "";
            position: absolute;
            left: 50%;
            top: -12px;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 15px solid #e53935;
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.9));
            transform: translateX(-50%);
        }

        #directionGuide {
            display: none;
            position: fixed;
            z-index: 5;
            height: 2px;
            background: #ffeb3b;
            box-shadow: 0 0 2px black;
            pointer-events: none;
            transform-origin: left center;
        }

        #calibrationHint {
            display: none;
            position: fixed;
            left: 50%;
            bottom: 6px;
            z-index: 6;
            max-width: calc(100% - 12px);
            padding: 4px 7px;
            border-radius: 4px;
            color: white;
            background: rgba(0, 0, 0, 0.82);
            font: 11px/1.25 sans-serif;
            text-align: center;
            transform: translateX(-50%);
            pointer-events: none;
        }

        body.calibrating {
            cursor: crosshair;
        }

        body.calibrating #mapLayer {
            outline: 2px solid rgba(255, 235, 59, 0.9);
            outline-offset: -2px;
        }

        body.calibrating #calibrationHint {
            display: block;
        }
    </style>
</head>
<body>
    <div id="mapLayer">
        <img src="" id="mainImg" alt="Current map" draggable="false"/>
        <div id="playerPin" aria-hidden="true"></div>
    </div>
    <div id="directionGuide"></div>
    <div id="calibrationHint"></div>
    <script src="renderer.js"></script>
</body>
</html>
